<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Fixora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F9FAFB;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      background: #fff;
      border-bottom: 1px solid #E5E7EB;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
    }
    .logo-text { font-weight: bold; font-size: 1.2rem; }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-card {
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .btn-submit {
      background: #2563EB;
      color: white;
      padding: 0.7rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn-submit:hover {
      background: #1D4ED8;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="logo-text">Fixora</span>
    <span>Customer Portal</span>
  </nav>

  <main>
    <div class="auth-card">

      <h2>Create Account</h2>
      <p style="font-size: 12px; color: gray;">Join Fixora today</p>

      <!-- ✅ FIXED FORM -->
      <form class="auth-form" action="/user/register" method="post">

        <!-- Name -->
        <div class="input-wrap">
          <input type="text" name="name" placeholder="Enter Name" required>
        </div>

        <!-- Mobile -->
        <div class="input-wrap">
          <input type="text" name="mobile" placeholder="Mobile Number" required>
        </div>

        <!-- Email -->
        <div class="input-wrap">
          <input type="email" name="email" placeholder="Email" required>
        </div>

        <!-- Password -->
        <div class="input-wrap">
          <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="btn-submit">Register</button>

      </form>

      <p style="margin-top:10px; font-size:12px;">
        Already have account? <a href="/login">Login</a>
      </p>

    </div>
  </main>

</body>
</html>
