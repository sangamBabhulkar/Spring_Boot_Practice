<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Login — Fixora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* Navbar */
    .navbar {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #E5E7EB;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .logo-icon {
      width: 2rem; height: 2rem; border-radius: 0.5rem;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(37,99,235,0.3);
    }
    .logo-icon svg { width: 1.1rem; height: 1.1rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(to right, #2563EB, #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-badge {
      display: flex; align-items: center; gap: 0.375rem;
      padding: 0.3rem 0.875rem; border-radius: 9999px;
      background: #ECFDF5; border: 1px solid #A7F3D0;
      font-size: 0.8rem; font-weight: 600; color: #065F46;
    }
    .nav-badge svg { width: 0.875rem; height: 0.875rem; stroke: #065F46; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Main */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1rem; position: relative;
    }

    /* Back link */
    .back-link {
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.8125rem; font-weight: 500; color: #6B7280;
      transition: color 0.2s; position: absolute; top: 1.5rem; left: 1.5rem;
    }
    .back-link:hover { color: #059669; }
    .back-link svg { width: 0.875rem; height: 0.875rem; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Auth Card */
    .auth-card {
      background: #fff; border: 1px solid #E5E7EB; border-radius: 1.25rem;
      padding: 2.5rem 2rem; width: 100%; max-width: 22rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    /* Card Header */
    .card-header { text-align: center; margin-bottom: 2rem; }
    .partner-icon {
      width: 3.5rem; height: 3.5rem; border-radius: 1rem;
      background: linear-gradient(135deg, #059669, #10B981);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 6px 18px rgba(16,185,129,0.35);
    }
    .partner-icon svg { width: 1.75rem; height: 1.75rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .card-header h2 { font-size: 1.6rem; font-weight: 800; color: #111827; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
    .card-header p  { font-size: 0.85rem; color: #6B7280; }

    /* Error alert — wraps th:text="${error}" */
    .error-alert {
      display: flex; align-items: center; gap: 0.5rem;
      background: #FEE2E2; border: 1px solid #FECACA;
      border-radius: 0.625rem; padding: 0.75rem 0.875rem; margin-bottom: 1.25rem;
    }
    .error-alert svg { width: 1rem; height: 1rem; stroke: #DC2626; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    /* <p th:text="${error}"> preserved exactly — styled via parent */
    .error-alert p { font-size: 0.8125rem; font-weight: 500; color: #991B1B; margin: 0; }

    /* Form */
    .auth-form { display: flex; flex-direction: column; gap: 1.2rem; }
    .field-group { display: flex; flex-direction: column; gap: 0.375rem; }
    .field-group label { font-size: 0.8125rem; font-weight: 500; color: #374151; }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; top: 50%; left: 0.75rem; transform: translateY(-50%);
      width: 1rem; height: 1rem; stroke: #9CA3AF; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none;
    }
    .input-wrap input {
      width: 100%; padding: 0.75rem 0.75rem 0.75rem 2.5rem;
      border: 1px solid #D1D5DB; border-radius: 0.5rem;
      font-size: 0.875rem; font-family: inherit; color: #111827;
      background: #fff; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input::placeholder { color: #9CA3AF; }
    .input-wrap input:focus { border-color: #10B981; box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }

    /* Remember & Forgot row */
    .form-meta { display: flex; align-items: center; justify-content: space-between; margin-top: -0.25rem; }
    .checkbox-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8125rem; color: #374151; cursor: pointer; }
    .checkbox-label input[type="checkbox"] { accent-color: #10B981; width: 1rem; height: 1rem; cursor: pointer; }
    .forgot-link { font-size: 0.8125rem; font-weight: 500; color: #059669; transition: color 0.2s; }
    .forgot-link:hover { color: #047857; }

    /* Submit */
    .btn-submit {
      width: 100%; padding: 0.875rem 1rem;
      background: linear-gradient(135deg, #059669, #10B981);
      color: #fff; border: none; border-radius: 0.6rem;
      font-size: 0.9375rem; font-weight: 600; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(16,185,129,0.35);
      transition: opacity 0.2s, transform 0.2s; margin-top: 0.5rem;
    }
    .btn-submit:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit svg { width: 1rem; height: 1rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0 1rem; }
    .divider-line { flex: 1; height: 1px; background: #E5E7EB; }
    .divider span { font-size: 0.75rem; color: #9CA3AF; white-space: nowrap; }

    /* Auth footer */
    .auth-footer { text-align: center; font-size: 0.8125rem; color: #6B7280; }
    .auth-footer a { font-weight: 600; color: #059669; transition: color 0.2s; }
    .auth-footer a:hover { color: #047857; }

    /* Secure note */
    .secure-note { display: flex; align-items: center; justify-content: center; gap: 0.375rem; font-size: 0.72rem; color: #9CA3AF; margin-top: 1.25rem; }
    .secure-note svg { width: 0.8rem; height: 0.8rem; stroke: #9CA3AF; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Footer */
    footer {
      background: #fff; border-top: 1px solid #E5E7EB;
      padding: 1.125rem 2rem; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 0.75rem;
    }
    .footer-copy { font-size: 0.8125rem; color: #9CA3AF; }
    .footer-socials { display: flex; gap: 1rem; }
    .footer-socials svg { width: 1.125rem; height: 1.125rem; stroke: #9CA3AF; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: stroke 0.2s; }
    .footer-socials svg:hover { stroke: #10B981; }

    /* Responsive */
    @media (max-width: 480px) {
      .navbar { padding: 0.875rem 1rem; }
      .auth-card { padding: 2rem 1.25rem; }
      footer { padding: 1rem; justify-content: center; text-align: center; }
      .back-link { top: 1rem; left: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="logo" href="/">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <span class="logo-text">Fixora</span>
    </a>
    <div class="nav-badge">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      Partner Login
    </div>
  </nav>

  <!-- Main -->
  <main>

    <a class="back-link" href="/">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Home
    </a>

    <div class="auth-card">

      <!-- Card Header -->
      <div class="card-header">
        <div class="partner-icon">
          <svg viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
        </div>
        <h2>Service Partner Login</h2>
        <p>Welcome back — sign in to your partner account.</p>
      </div>

      <!-- Error alert — th:if shows only when error exists -->
      <!-- th:text="${error}" is on the <p> tag, preserved exactly as in the original -->
      <div class="error-alert" th:if="${error}">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p th:text="${error}"></p>
      </div>

      <!-- Form — action="/partner/login" method="post" preserved exactly -->
      <form class="auth-form" action="/partner/login" method="post">

        <!-- name="email" preserved exactly -->
        <div class="field-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
        </div>

        <!-- name="password" preserved exactly -->
        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>
        </div>

        <!-- Remember me + Forgot password -->
        <div class="form-meta">
          <label class="checkbox-label">
            <input type="checkbox" name="remember-me" /> Remember me
          </label>
          <a class="forgot-link" href="/forgot-password">Forgot password?</a>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-submit">
          <svg viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Login
        </button>

      </form>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span>new partner?</span>
        <div class="divider-line"></div>
      </div>

      <!-- Register link -->
      <div class="auth-footer">
        <a href="/partner/register">Apply as a Service Partner</a>
      </div>

      <!-- Secure note -->
      <div class="secure-note">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Your data is safe &amp; encrypted
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <span class="footer-copy">© <script>document.write(new Date().getFullYear())</script> Fixora Inc. All rights reserved.</span>
    <div class="footer-socials">
      <svg viewBox="0 0 24 24" title="Facebook"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      <svg viewBox="0 0 24 24" title="Twitter"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      <svg viewBox="0 0 24 24" title="Instagram"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
    </div>
  </footer>

</body>
</html>
