<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Give Review — Fixora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ── Navbar ── */
    .navbar {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #E5E7EB;
      padding: 0.9rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .logo-icon {
      width: 2rem; height: 2rem; border-radius: 0.5rem;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(37,99,235,0.3);
    }
    .logo-icon svg { width: 1.1rem; height: 1.1rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(to right, #2563EB, #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-badge {
      display: flex; align-items: center; gap: 0.375rem;
      padding: 0.3rem 0.875rem; border-radius: 9999px;
      background: #FEF3C7; border: 1px solid #FDE68A;
      font-size: 0.8rem; font-weight: 600; color: #92400E;
    }
    .nav-badge svg { width: 0.875rem; height: 0.875rem; stroke: #D97706; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Main ── */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1rem; position: relative;
    }

    /* ── Back Link ── */
    .back-link {
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.8125rem; font-weight: 500; color: #6B7280;
      transition: color 0.2s; position: absolute; top: 1.5rem; left: 1.5rem;
    }
    .back-link:hover { color: #2563EB; }
    .back-link svg { width: 0.875rem; height: 0.875rem; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Review Card ── */
    .review-card {
      background: #fff; border: 1px solid #E5E7EB;
      border-radius: 1.25rem; padding: 2.5rem 2rem;
      width: 100%; max-width: 24rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    /* Card Header */
    .card-header { text-align: center; margin-bottom: 2rem; }
    .review-icon {
      width: 3.5rem; height: 3.5rem; border-radius: 1rem;
      background: linear-gradient(135deg, #D97706, #F59E0B);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 6px 18px rgba(245,158,11,0.35);
    }
    .review-icon svg { width: 1.75rem; height: 1.75rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .card-header h2 { font-size: 1.6rem; font-weight: 800; color: #111827; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
    .card-header p  { font-size: 0.85rem; color: #6B7280; }

    /* ── Form ── */
    .review-form { display: flex; flex-direction: column; gap: 1.25rem; }

    .field-group { display: flex; flex-direction: column; gap: 0.375rem; }
    .field-group label { font-size: 0.8125rem; font-weight: 500; color: #374151; }

    /* ── Star Rating Picker ── */
    .stars-label { font-size: 0.8125rem; font-weight: 500; color: #374151; margin-bottom: 0.375rem; }

    .star-picker {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.75rem 1rem;
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-radius: 0.625rem;
      margin-bottom: 0.25rem;
    }

    /* Hidden radio buttons — name="rating" preserved on the hidden select */
    .star-picker input[type="radio"] {
      display: none;
    }

    /* Visual star labels */
    .star-btn {
      font-size: 1.75rem;
      cursor: pointer;
      color: #D1D5DB;
      transition: color 0.15s, transform 0.15s;
      line-height: 1;
      user-select: none;
    }

    .star-btn:hover { transform: scale(1.2); }

    /* Filled stars via JS */
    .star-btn.filled { color: #F59E0B; }

    .star-count-label {
      margin-left: auto;
      font-size: 0.8125rem;
      font-weight: 700;
      color: #92400E;
      background: #FEF3C7;
      border: 1px solid #FDE68A;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      min-width: 3.5rem;
      text-align: center;
    }

    /* Hidden select — name="rating" submitted to backend, synced by JS */
    .rating-hidden {
      display: none;
    }

    /* ── Comment Textarea ── */
    .textarea-wrap { position: relative; }

    .textarea-icon {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      width: 1rem; height: 1rem;
      stroke: #9CA3AF; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
    }

    .review-form textarea {
      width: 100%;
      padding: 0.75rem 0.75rem 0.75rem 2.5rem;
      border: 1px solid #D1D5DB;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111827;
      background: #fff;
      outline: none;
      resize: vertical;
      min-height: 7rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }

    .review-form textarea::placeholder { color: #9CA3AF; }

    .review-form textarea:focus {
      border-color: #F59E0B;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
    }

    /* Character counter */
    .char-counter {
      text-align: right;
      font-size: 0.72rem;
      color: #9CA3AF;
      margin-top: 0.25rem;
    }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%; padding: 0.875rem 1rem;
      background: linear-gradient(135deg, #D97706, #F59E0B);
      color: #fff; border: none; border-radius: 0.6rem;
      font-size: 0.9375rem; font-weight: 600; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(245,158,11,0.35);
      transition: opacity 0.2s, transform 0.2s; margin-top: 0.5rem;
    }
    .btn-submit:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit svg { width: 1rem; height: 1rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Info Note ── */
    .info-note {
      display: flex; align-items: flex-start; gap: 0.5rem;
      background: #FFFBEB; border: 1px solid #FDE68A;
      border-radius: 0.625rem; padding: 0.75rem 0.875rem; margin-top: 1.25rem;
    }
    .info-note svg { width: 1rem; height: 1rem; stroke: #D97706; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; margin-top: 0.1rem; }
    .info-note p { font-size: 0.775rem; color: #92400E; line-height: 1.5; }

    /* ── Footer ── */
    footer {
      background: #fff; border-top: 1px solid #E5E7EB;
      padding: 1.125rem 2rem; display: flex;
      align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
    }
    .footer-copy { font-size: 0.8125rem; color: #9CA3AF; }
    .footer-socials { display: flex; gap: 1rem; }
    .footer-socials svg { width: 1.125rem; height: 1.125rem; stroke: #9CA3AF; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: stroke 0.2s; }
    .footer-socials svg:hover { stroke: #F59E0B; }

    /* Responsive */
    @media (max-width: 480px) {
      .navbar { padding: 0.875rem 1rem; }
      .review-card { padding: 2rem 1.25rem; }
      footer { padding: 1rem; justify-content: center; text-align: center; }
      .back-link { top: 1rem; left: 1rem; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a class="logo" href="/">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <span class="logo-text">Fixora</span>
    </a>
    <div class="nav-badge">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Leave a Review
    </div>
  </nav>

  <!-- ── Main ── -->
  <main>

    <a class="back-link" href="/my-bookings">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Bookings
    </a>

    <div class="review-card">

      <!-- Card Header -->
      <div class="card-header">
        <div class="review-icon">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <h2>Give Review</h2>
        <p>Share your experience with this service provider.</p>
      </div>

      <!-- Form — action="/review/save" method="post" preserved exactly -->
      <form class="review-form" action="/review/save" method="post">

        <!-- Hidden partner ID — th:value="${review.partnerId}" preserved exactly -->
        <input type="hidden" name="partnerId" th:value="${review.partnerId}" />

        <!-- Star Rating — visual picker syncs to hidden select name="rating" -->
        <div class="field-group">
          <p class="stars-label">Rating</p>

          <!-- Visual star picker (purely presentational, syncs hidden select) -->
          <div class="star-picker" id="starPicker">
            <span class="star-btn" data-value="1">★</span>
            <span class="star-btn" data-value="2">★</span>
            <span class="star-btn" data-value="3">★</span>
            <span class="star-btn" data-value="4">★</span>
            <span class="star-btn" data-value="5">★</span>
            <span class="star-count-label" id="starLabel">5 / 5</span>
          </div>

          <!-- Hidden select — name="rating" with original option values preserved exactly,
               submitted to backend; value kept in sync by JS -->
          <select name="rating" id="ratingSelect" class="rating-hidden" required>
            <option value="5" selected>5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
        </div>

        <!-- Comment — name="comment" preserved exactly -->
        <div class="field-group">
          <label for="comment">Comment</label>
          <div class="textarea-wrap">
            <svg class="textarea-icon" viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <textarea
              id="comment"
              name="comment"
              rows="4"
              maxlength="500"
              placeholder="Tell us about your experience with this provider…"
              oninput="updateCounter(this)"></textarea>
          </div>
          <p class="char-counter" id="charCounter">0 / 500</p>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Submit Review
        </button>

      </form>

      <!-- Info note -->
      <div class="info-note">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>Your review helps other customers choose the right professional. Thank you for your feedback!</p>
      </div>

    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <span class="footer-copy">© <script>document.write(new Date().getFullYear())</script> Fixora Inc. All rights reserved.</span>
    <div class="footer-socials">
      <svg viewBox="0 0 24 24" title="Facebook"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      <svg viewBox="0 0 24 24" title="Twitter"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      <svg viewBox="0 0 24 24" title="Instagram"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
    </div>
  </footer>

  <script>
    // ── Star picker — syncs visual stars to hidden select name="rating" ──
    // The hidden <select name="rating"> with original option values is what gets submitted.
    const stars     = document.querySelectorAll('.star-btn');
    const select    = document.getElementById('ratingSelect');
    const starLabel = document.getElementById('starLabel');

    // Default: all 5 stars filled
    let currentRating = 5;
    fillStars(5);

    stars.forEach(star => {
      // Hover preview
      star.addEventListener('mouseenter', () => fillStars(+star.dataset.value));
      star.addEventListener('mouseleave', () => fillStars(currentRating));

      // Click — set rating
      star.addEventListener('click', () => {
        currentRating = +star.dataset.value;
        select.value  = currentRating;
        starLabel.textContent = currentRating + ' / 5';
        fillStars(currentRating);
      });
    });

    function fillStars(n) {
      stars.forEach(s => {
        s.classList.toggle('filled', +s.dataset.value <= n);
      });
    }

    // ── Character counter for textarea ──
    function updateCounter(el) {
      document.getElementById('charCounter').textContent = el.value.length + ' / 500';
    }
  </script>

</body>
</html>
