<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Service Slot — Fixora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ── Navbar ── */
    .navbar {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #E5E7EB;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .logo-icon {
      width: 2rem;
      height: 2rem;
      border-radius: 0.5rem;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
    }

    .logo-icon svg {
      width: 1.1rem;
      height: 1.1rem;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #2563EB, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-badge {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.3rem 0.875rem;
      border-radius: 9999px;
      background: #ECFDF5;
      border: 1px solid #A7F3D0;
      font-size: 0.8rem;
      font-weight: 600;
      color: #065F46;
    }

    .nav-badge svg {
      width: 0.875rem;
      height: 0.875rem;
      stroke: #065F46;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      position: relative;
    }

    /* ── Back Link ── */
    .back-link {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #6B7280;
      transition: color 0.2s;
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
    }

    .back-link:hover { color: #2563EB; }

    .back-link svg {
      width: 0.875rem;
      height: 0.875rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Booking Card ── */
    .booking-card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 26rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    /* ── Card Header ── */
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .booking-icon {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, #059669, #10B981);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 6px 18px rgba(16, 185, 129, 0.35);
    }

    .booking-icon svg {
      width: 1.75rem;
      height: 1.75rem;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-header h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .card-header p {
      font-size: 0.85rem;
      color: #6B7280;
    }

    /* ── Form ── */
    .booking-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .field-group label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #374151;
    }

    /* ── Input Wrap ── */
    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      top: 50%;
      left: 0.75rem;
      transform: translateY(-50%);
      width: 1rem;
      height: 1rem;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.75rem 0.75rem 0.75rem 2.5rem;
      border: 1px solid #D1D5DB;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder { color: #9CA3AF; }

    .input-wrap input:focus {
      border-color: #10B981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
    }

    .input-wrap input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.5;
      cursor: pointer;
    }

    /* ── Select Wrap ── */
    .select-wrap {
      position: relative;
    }

    .select-wrap select {
      width: 100%;
      padding: 0.75rem 2.25rem 0.75rem 2.5rem;
      border: 1px solid #D1D5DB;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .select-wrap select:focus {
      border-color: #10B981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
    }

    .select-icon-left {
      position: absolute;
      top: 50%;
      left: 0.75rem;
      transform: translateY(-50%);
      width: 1rem;
      height: 1rem;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .select-chevron {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      width: 1rem;
      height: 1rem;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    /* ── Time Slot Pills ── */
    .slots-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.375rem;
    }

    .time-slots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
    }

    .slot-option {
      position: relative;
    }

    .slot-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slot-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      padding: 0.75rem 0.5rem;
      border: 1.5px solid #E5E7EB;
      border-radius: 0.625rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      text-align: center;
      background: #fff;
    }

    .slot-label:hover {
      border-color: #6EE7B7;
      background: #F0FDF4;
    }

    .slot-option input[type="radio"]:checked + .slot-label {
      border-color: #10B981;
      background: #ECFDF5;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .slot-time {
      font-size: 0.8125rem;
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
    }

    .slot-option input[type="radio"]:checked + .slot-label .slot-time {
      color: #065F46;
    }

    .slot-icon {
      width: 1rem;
      height: 1rem;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-bottom: 0.1rem;
    }

    .slot-option input[type="radio"]:checked + .slot-label .slot-icon {
      stroke: #10B981;
    }

    /* Hidden select for form submission — keeps name="timeSlot" working */
    .slot-hidden {
      display: none;
    }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%;
      padding: 0.875rem 1rem;
      background: linear-gradient(135deg, #059669, #10B981);
      color: #fff;
      border: none;
      border-radius: 0.6rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35);
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 0.5rem;
    }

    .btn-submit:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    .btn-submit svg {
      width: 1rem;
      height: 1rem;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Info Note ── */
    .info-note {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 0.625rem;
      padding: 0.75rem 0.875rem;
      margin-top: 1.25rem;
    }

    .info-note svg {
      width: 1rem;
      height: 1rem;
      stroke: #2563EB;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .info-note p {
      font-size: 0.775rem;
      color: #1D4ED8;
      line-height: 1.5;
    }

    /* ── Footer ── */
    footer {
      background: #fff;
      border-top: 1px solid #E5E7EB;
      padding: 1.125rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .footer-copy {
      font-size: 0.8125rem;
      color: #9CA3AF;
    }

    .footer-socials {
      display: flex;
      gap: 1rem;
    }

    .footer-socials svg {
      width: 1.125rem;
      height: 1.125rem;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      cursor: pointer;
      transition: stroke 0.2s;
    }

    .footer-socials svg:hover { stroke: #10B981; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .navbar { padding: 0.875rem 1rem; }
      .booking-card { padding: 2rem 1.25rem; }
      footer { padding: 1rem; justify-content: center; text-align: center; }
      .back-link { top: 1rem; left: 1rem; }
      .time-slots { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a class="logo" href="/">
      <div class="logo-icon">
        <!-- Wrench icon -->
        <svg viewBox="0 0 24 24">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <span class="logo-text">Fixora</span>
    </a>

    <div class="nav-badge">
      <!-- Clock icon -->
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Book a Slot
    </div>
  </nav>

  <!-- ── Main ── -->
  <main>

    <!-- Back Link -->
    <a class="back-link" href="/">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Home
    </a>

    <div class="booking-card">

      <!-- Card Header -->
      <div class="card-header">
        <div class="booking-icon">
          <!-- Clock icon -->
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <h2>Book Service Slot</h2>
        <p>Pick a date and time that works best for you.</p>
      </div>

      <!-- Form — action, method & all name/th: attributes preserved exactly -->
      <form class="booking-form" action="/booking/create" method="post">

        <!-- Hidden partner ID — th:value preserved exactly -->
        <input type="hidden" name="partnerId" th:value="${booking.partnerId}" />

        <!-- Customer Name -->
        <div class="field-group">
          <label for="customerName">Your Name</label>
          <div class="input-wrap">
            <!-- User icon -->
            <svg class="input-icon" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              id="customerName"
              name="customerName"
              placeholder="Enter your name"
              required
            />
          </div>
        </div>

        <!-- Booking Date -->
        <div class="field-group">
          <label for="bookingDate">Date</label>
          <div class="input-wrap">
            <!-- Calendar icon -->
            <svg class="input-icon" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input
              type="date"
              id="bookingDate"
              name="bookingDate"
              required
            />
          </div>
        </div>

        <!-- Time Slot — visual pill picker + hidden select for backend -->
        <div class="field-group">
          <p class="slots-label">Select Time Slot</p>

          <!-- Visual pill grid (updates hidden select on click) -->
          <div class="time-slots">

            <div class="slot-option">
              <input type="radio" name="_slotPicker" id="slot1" value="9AM-11AM" onchange="syncSlot(this.value)" />
              <label class="slot-label" for="slot1">
                <svg class="slot-icon" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span class="slot-time">9 AM – 11 AM</span>
              </label>
            </div>

            <div class="slot-option">
              <input type="radio" name="_slotPicker" id="slot2" value="11AM-1PM" onchange="syncSlot(this.value)" />
              <label class="slot-label" for="slot2">
                <svg class="slot-icon" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span class="slot-time">11 AM – 1 PM</span>
              </label>
            </div>

            <div class="slot-option">
              <input type="radio" name="_slotPicker" id="slot3" value="2PM-4PM" onchange="syncSlot(this.value)" />
              <label class="slot-label" for="slot3">
                <svg class="slot-icon" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span class="slot-time">2 PM – 4 PM</span>
              </label>
            </div>

            <div class="slot-option">
              <input type="radio" name="_slotPicker" id="slot4" value="4PM-6PM" onchange="syncSlot(this.value)" />
              <label class="slot-label" for="slot4">
                <svg class="slot-icon" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span class="slot-time">4 PM – 6 PM</span>
              </label>
            </div>

          </div>

          <!-- Hidden select — name="timeSlot" preserved exactly, submitted to backend -->
          <select name="timeSlot" id="timeSlot" required class="slot-hidden" aria-hidden="true">
            <option value="">--Select--</option>
            <option value="9AM-11AM">9AM-11AM</option>
            <option value="11AM-1PM">11AM-1PM</option>
            <option value="2PM-4PM">2PM-4PM</option>
            <option value="4PM-6PM">4PM-6PM</option>
          </select>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit">
          <!-- CheckCircle icon -->
          <svg viewBox="0 0 24 24">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Book Service
        </button>

      </form>

      <!-- Info Note -->
      <div class="info-note">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>You'll receive a confirmation once the partner accepts your booking request.</p>
      </div>

    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <span class="footer-copy">© <script>document.write(new Date().getFullYear())</script> Fixora Inc. All rights reserved.</span>
    <div class="footer-socials">
      <!-- Facebook -->
      <svg viewBox="0 0 24 24" title="Facebook">
        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
      </svg>
      <!-- Twitter -->
      <svg viewBox="0 0 24 24" title="Twitter">
        <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>
      </svg>
      <!-- Instagram -->
      <svg viewBox="0 0 24 24" title="Instagram">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
    </div>
  </footer>

  <script>
    // Syncs the visual pill selection to the hidden <select name="timeSlot">
    // so the backend receives the exact same values as the original dropdown
    function syncSlot(value) {
      document.getElementById('timeSlot').value = value;
    }
  </script>

</body>
</html>
