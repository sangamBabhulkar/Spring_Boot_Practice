<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Profile — Fixora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ── Navbar ── */
    .navbar {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #E5E7EB;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .logo-icon {
      width: 2rem; height: 2rem; border-radius: 0.5rem;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(37,99,235,0.3);
    }
    .logo-icon svg { width: 1.1rem; height: 1.1rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(to right, #2563EB, #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .nav-right { display: flex; align-items: center; gap: 0.75rem; }

    .nav-badge {
      display: flex; align-items: center; gap: 0.375rem;
      padding: 0.3rem 0.875rem; border-radius: 9999px;
      background: #EFF6FF; border: 1px solid #BFDBFE;
      font-size: 0.8rem; font-weight: 600; color: #1D4ED8;
    }
    .nav-badge svg { width: 0.875rem; height: 0.875rem; stroke: #1D4ED8; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .nav-link {
      display: flex; align-items: center; gap: 0.375rem;
      padding: 0.35rem 0.875rem; border-radius: 0.5rem;
      border: 1px solid #E5E7EB; background: #fff;
      font-size: 0.8rem; font-weight: 500; color: #374151;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .nav-link:hover { border-color: #BFDBFE; color: #2563EB; background: #EFF6FF; }
    .nav-link svg { width: 0.875rem; height: 0.875rem; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Main ── */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1rem; position: relative;
    }

    /* ── Back Link ── */
    .back-link {
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.8125rem; font-weight: 500; color: #6B7280;
      transition: color 0.2s; position: absolute; top: 1.5rem; left: 1.5rem;
    }
    .back-link:hover { color: #2563EB; }
    .back-link svg { width: 0.875rem; height: 0.875rem; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Profile Card ── */
    .profile-card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 1.5rem;
      width: 100%;
      max-width: 28rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    /* Card hero banner */
    .card-banner {
      height: 7rem;
      background: linear-gradient(135deg, #1D4ED8, #2563EB, #10B981);
      position: relative;
    }

    /* Avatar circle overlapping banner */
    .avatar-wrap {
      position: absolute;
      bottom: -2.25rem;
      left: 50%;
      transform: translateX(-50%);
    }

    .avatar-circle {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #059669, #10B981);
      border: 3px solid #fff;
      box-shadow: 0 4px 16px rgba(16,185,129,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-circle svg {
      width: 2rem;
      height: 2rem;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Card body */
    .card-body {
      padding: 3.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Verified badge */
    .verified-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      background: #D1FAE5;
      border: 1px solid #A7F3D0;
      font-size: 0.7rem;
      font-weight: 600;
      color: #065F46;
      margin-bottom: 0.75rem;
    }
    .verified-pill svg { width: 0.7rem; height: 0.7rem; stroke: #059669; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* Provider name — th:text="${provider.name}" preserved exactly */
    .provider-name {
      font-size: 1.6rem;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.02em;
      margin-bottom: 0.375rem;
    }

    /* Subtitle */
    .provider-subtitle {
      font-size: 0.875rem;
      color: #6B7280;
      margin-bottom: 1.75rem;
    }

    /* Divider */
    .card-divider {
      width: 100%;
      height: 1px;
      background: #F3F4F6;
      margin-bottom: 1.5rem;
    }

    /* Meta info rows */
    .meta-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      margin-bottom: 1.75rem;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1rem;
      background: #F9FAFB;
      border: 1px solid #F3F4F6;
      border-radius: 0.75rem;
    }

    .meta-left {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: 0.8125rem;
      color: #6B7280;
      font-weight: 500;
    }

    .meta-left svg {
      width: 1rem;
      height: 1rem;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* th:text values land inside these spans */
    .meta-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: #111827;
    }

    /* Service type badge */
    .service-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #EFF6FF;
      color: #1D4ED8;
      border: 1px solid #BFDBFE;
    }

    /* Experience bar */
    .exp-bar-wrap { width: 100%; margin-bottom: 1.75rem; }
    .exp-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #9CA3AF;
      margin-bottom: 0.375rem;
    }
    .exp-bar-label span:last-child { font-weight: 600; color: #374151; }
    .exp-bar-track { height: 6px; background: #F3F4F6; border-radius: 9999px; overflow: hidden; }
    .exp-bar-fill {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(to right, #2563EB, #10B981);
      /* width set via th:style — capped at 100%, assumes max ~20 yrs */
    }

    /* Rating row */
    .rating-row {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      margin-bottom: 1.75rem;
    }

    .stars { color: #F59E0B; font-size: 1rem; letter-spacing: 0.05em; }
    .rating-text { font-size: 0.8125rem; color: #6B7280; }
    .rating-text strong { color: #111827; font-weight: 600; }

    /* Book Service CTA — th:href preserved exactly */
    .btn-book {
      width: 100%;
      padding: 0.9rem 1rem;
      background: linear-gradient(135deg, #1D4ED8, #2563EB);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 16px rgba(37,99,235,0.3);
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-book:hover  { opacity: 0.9; transform: translateY(-2px); }
    .btn-book:active { transform: translateY(0); }
    .btn-book svg { width: 1.1rem; height: 1.1rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* My Bookings secondary link */
    .btn-secondary-link {
      margin-top: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #E5E7EB;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      background: #fff;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-secondary-link:hover { border-color: #BFDBFE; color: #2563EB; background: #EFF6FF; }
    .btn-secondary-link svg { width: 0.875rem; height: 0.875rem; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Footer ── */
    footer {
      background: #fff; border-top: 1px solid #E5E7EB;
      padding: 1.125rem 2rem; display: flex;
      align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
    }
    .footer-copy { font-size: 0.8125rem; color: #9CA3AF; }
    .footer-socials { display: flex; gap: 1rem; }
    .footer-socials svg { width: 1.125rem; height: 1.125rem; stroke: #9CA3AF; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: stroke 0.2s; }
    .footer-socials svg:hover { stroke: #2563EB; }

    /* Responsive */
    @media (max-width: 480px) {
      .navbar { padding: 0.875rem 1rem; }
      .card-body { padding: 3.5rem 1.25rem 1.75rem; }
      footer { padding: 1rem; justify-content: center; text-align: center; }
      .back-link { top: 1rem; left: 1rem; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a class="logo" href="/">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <span class="logo-text">Fixora</span>
    </a>

    <div class="nav-right">
      <div class="nav-badge">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Provider Profile
      </div>
      <a class="nav-link" href="/services">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        All Services
      </a>
    </div>
  </nav>

  <!-- ── Main ── -->
  <main>

    <a class="back-link" href="/services">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Services
    </a>

    <!-- Profile Card -->
    <div class="profile-card">

      <!-- Banner with avatar -->
      <div class="card-banner">
        <div class="avatar-wrap">
          <div class="avatar-circle">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
      </div>

      <!-- Card body -->
      <div class="card-body">

        <!-- Verified pill -->
        <div class="verified-pill">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Verified Professional
        </div>

        <!-- Provider name — th:text="${provider.name}" preserved exactly -->
        <h2 class="provider-name" th:text="${provider.name}">Provider Name</h2>
        <p class="provider-subtitle">Trusted service partner on Fixora</p>

        <div class="card-divider"></div>

        <!-- Meta rows — all th:text values preserved exactly -->
        <div class="meta-list">

          <!-- Service type — th:text="${provider.serviceType}" preserved exactly -->
          <div class="meta-row">
            <div class="meta-left">
              <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
              Service
            </div>
            <span class="service-badge" th:text="${provider.serviceType}">Service Type</span>
          </div>

          <!-- Experience — th:text="${provider.experience}" preserved exactly -->
          <div class="meta-row">
            <div class="meta-left">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Experience
            </div>
            <span class="meta-value">
              <span th:text="${provider.experience}">0</span> years
            </span>
          </div>

        </div>

        <!-- Experience progress bar (visual — capped at 100%, assumes max ~20 yrs) -->
        <div class="exp-bar-wrap">
          <div class="exp-bar-label">
            <span>Experience level</span>
            <span><span th:text="${provider.experience}">0</span> yrs</span>
          </div>
          <div class="exp-bar-track">
            <div class="exp-bar-fill"
              th:style="'width: min(calc(' + ${provider.experience} + ' * 5%), 100%)'">
            </div>
          </div>
        </div>

        <!-- Static star rating display -->
        <div class="rating-row">
          <span class="stars">★★★★★</span>
          <span class="rating-text"><strong>4.8</strong> / 5.0 rating</span>
        </div>

        <!-- Book Service button — th:href="@{/booking/{id}(id=${provider.id})}" preserved exactly -->
        <a th:href="@{/booking/{id}(id=${provider.id})}" class="btn-book">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <polyline points="9 16 11 18 15 14"/>
          </svg>
          Book Service
        </a>

        <!-- My Bookings secondary link -->
        <a href="/my-bookings" class="btn-secondary-link">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          View My Bookings
        </a>

      </div>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <span class="footer-copy">© <script>document.write(new Date().getFullYear())</script> Fixora Inc. All rights reserved.</span>
    <div class="footer-socials">
      <svg viewBox="0 0 24 24" title="Facebook"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      <svg viewBox="0 0 24 24" title="Twitter"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      <svg viewBox="0 0 24 24" title="Instagram"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
    </div>
  </footer>

</body>
</html>
