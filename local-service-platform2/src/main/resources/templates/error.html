<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error — Fixora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* ── Navbar ── */
    .navbar {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #E5E7EB;
      padding: 0.9rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .logo-icon {
      width: 2rem; height: 2rem; border-radius: 0.5rem;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(37,99,235,0.3);
    }
    .logo-icon svg { width: 1.1rem; height: 1.1rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(to right, #2563EB, #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-badge {
      display: flex; align-items: center; gap: 0.375rem;
      padding: 0.3rem 0.875rem; border-radius: 9999px;
      background: #FEE2E2; border: 1px solid #FECACA;
      font-size: 0.8rem; font-weight: 600; color: #991B1B;
    }
    .nav-badge svg { width: 0.875rem; height: 0.875rem; stroke: #DC2626; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Main ── */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1rem; position: relative;
      overflow: hidden;
    }

    /* Large faded 404 background text */
    .bg-404 {
      position: absolute;
      font-size: 18rem;
      font-weight: 800;
      color: #F3F4F6;
      letter-spacing: -0.05em;
      user-select: none;
      pointer-events: none;
      z-index: 0;
      line-height: 1;
    }

    /* ── Error Card ── */
    .error-card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 1.25rem;
      padding: 3rem 2rem;
      width: 100%;
      max-width: 24rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    /* Error icon */
    .error-icon-wrap {
      width: 5rem; height: 5rem; border-radius: 50%;
      background: #FEE2E2; border: 3px solid #FECACA;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
      animation: shake 4s ease-in-out infinite;
    }

    @keyframes shake {
      0%, 90%, 100% { transform: rotate(0deg); }
      92%           { transform: rotate(-6deg); }
      94%           { transform: rotate(6deg); }
      96%           { transform: rotate(-4deg); }
      98%           { transform: rotate(4deg); }
    }

    .error-icon-wrap svg {
      width: 2.25rem; height: 2.25rem;
      stroke: #DC2626; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Error code badge */
    .error-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.875rem; border-radius: 9999px;
      background: #FEE2E2; border: 1px solid #FECACA;
      font-size: 0.75rem; font-weight: 700; color: #991B1B;
      margin-bottom: 1.25rem;
    }

    /* Heading — text preserved exactly from original */
    .error-card h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    /* Description — text preserved exactly from original */
    .error-card p {
      font-size: 0.9rem;
      color: #6B7280;
      line-height: 1.65;
      margin-bottom: 0;
    }

    /* Divider */
    .card-divider { width: 100%; height: 1px; background: #F3F4F6; margin: 1.75rem 0; }

    /* Quick links row */
    .quick-links {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
      margin-bottom: 1.25rem;
    }

    .quick-link {
      display: flex; align-items: center; justify-content: center; gap: 0.375rem;
      padding: 0.625rem 0.75rem;
      border: 1px solid #E5E7EB; border-radius: 0.5rem;
      font-size: 0.8125rem; font-weight: 500; color: #374151;
      background: #fff; transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .quick-link:hover { border-color: #BFDBFE; color: #2563EB; background: #EFF6FF; }
    .quick-link svg { width: 0.875rem; height: 0.875rem; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Go Home button — href="/" preserved exactly */
    .btn-home {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.5rem; width: 100%;
      padding: 0.875rem 1rem;
      background: linear-gradient(135deg, #1D4ED8, #2563EB);
      color: #fff; border-radius: 0.625rem;
      font-size: 0.9375rem; font-weight: 600;
      box-shadow: 0 4px 14px rgba(37,99,235,0.3);
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-home:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-home:active { transform: translateY(0); }
    .btn-home svg { width: 1rem; height: 1rem; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Footer ── */
    footer {
      background: #fff; border-top: 1px solid #E5E7EB;
      padding: 1.125rem 2rem; display: flex;
      align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
    }
    .footer-copy { font-size: 0.8125rem; color: #9CA3AF; }
    .footer-socials { display: flex; gap: 1rem; }
    .footer-socials svg { width: 1.125rem; height: 1.125rem; stroke: #9CA3AF; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: stroke 0.2s; }
    .footer-socials svg:hover { stroke: #2563EB; }

    /* Responsive */
    @media (max-width: 480px) {
      .navbar { padding: 0.875rem 1rem; }
      .error-card { padding: 2.5rem 1.25rem; }
      .bg-404 { font-size: 10rem; }
      footer { padding: 1rem; justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a class="logo" href="/">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <span class="logo-text">Fixora</span>
    </a>
    <div class="nav-badge">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Page Error
    </div>
  </nav>

  <!-- ── Main ── -->
  <main>

    <!-- Faded background number -->
    <span class="bg-404">404</span>

    <div class="error-card">

      <!-- Shaking error icon -->
      <div class="error-icon-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>

      <!-- Error badge -->
      <div class="error-badge">404 — Not Found</div>

      <!-- Heading & description — text preserved exactly from original -->
      <h1>Oops! Something went wrong.</h1>
      <p>The page you requested could not be found.</p>

      <div class="card-divider"></div>

      <!-- Quick navigation links -->
      <div class="quick-links">
        <a class="quick-link" href="/services">
          <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          Services
        </a>
        <a class="quick-link" href="/my-bookings">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Bookings
        </a>
        <a class="quick-link" href="/login">
          <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Login
        </a>
        <a class="quick-link" href="/user/register">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Register
        </a>
      </div>

      <!-- Go Home — href="/" preserved exactly -->
      <a href="/" class="btn-home">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go Home
      </a>

    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <span class="footer-copy">© <script>document.write(new Date().getFullYear())</script> Fixora Inc. All rights reserved.</span>
    <div class="footer-socials">
      <svg viewBox="0 0 24 24" title="Facebook"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      <svg viewBox="0 0 24 24" title="Twitter"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      <svg viewBox="0 0 24 24" title="Instagram"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
    </div>
  </footer>

</body>
</html>
