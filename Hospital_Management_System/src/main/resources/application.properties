# ===================================================================
# APPLICATION CONFIGURATION
# ===================================================================
spring.application.name=hospital-management-system
server.port=8080

# ===================================================================
# DATABASE CONFIGURATION (H2 In-Memory Database)
# ===================================================================
# The DB URL creates an in-memory database named 'hospitaldb' that persists as long as the app is running.
spring.datasource.url=jdbc:h2:mem:hospitaldb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# 'update' automatically builds or updates database tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Show the raw SQL queries being executed in your console logs (Crucial for debugging!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# H2 CONSOLE CONFIGURATION (Web-Based DB Viewer)
# ===================================================================
# Enables the browser-based UI to access and query your in-memory database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security setting allowing the H2 console to render inside frames
spring.h2.console.settings.web-allow-others=false